<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 220px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
      margin: 0;
    }
    .launch-btn {
      background-color: #1565C0;
      color: white;
      border: none;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    .launch-btn:hover { background-color: #0D47A1; }
  </style>
</head>
<body>
  <button id="launchApp" class="launch-btn">Launch PathoLab Pro</button>
  <script src="popup.js" type="module"></script>
</body>
</html>
